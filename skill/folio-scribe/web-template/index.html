<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow,noarchive">
    <title>__SITE_TITLE__</title>
    <link rel="stylesheet" href="./assets/app.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-bar">
          <div class="brand-lockup">
            <span class="brand-mark" aria-hidden="true"></span>
            <div>
              <p class="eyebrow">Private trading journal</p>
              <h1>__SITE_TITLE__</h1>
            </div>
          </div>
          <span class="status-pill" title="Private journal export">Private</span>
        </div>

        <section class="stats-grid" aria-label="Journal stats">
          <div class="stat-card">
            <span id="stat-notes">0</span>
            <small>交易日</small>
          </div>
          <div class="stat-card">
            <span id="stat-sections">0/0</span>
            <small>已完成</small>
          </div>
          <div class="stat-card">
            <span id="stat-completion">0%</span>
            <small>完成率</small>
          </div>
        </section>

        <div class="theme-switch">
          <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Switch theme" aria-pressed="false">
            <span class="theme-option theme-option-light">Light</span>
            <span class="theme-toggle-track" aria-hidden="true">
              <span class="theme-toggle-thumb"></span>
            </span>
            <span class="theme-option theme-option-dark">Dark</span>
          </button>
        </div>
      </header>

      <div class="workspace">
      <aside class="sidebar">
        <div class="sidebar-meta" aria-label="Export summary">
          <span>最新 <strong id="stat-latest">-</strong></span>
          <span id="generated-at">已生成 -</span>
        </div>

        <div class="search-row">
          <input id="search-input" type="search" placeholder="搜索日期、标的、模型" autocomplete="off">
        </div>

        <nav class="filter-tabs" aria-label="Section filters">
          <button type="button" data-filter="all" class="active">全部</button>
          <button type="button" data-filter="hk_plan">港股计划</button>
          <button type="button" data-filter="hk_review">港股总结</button>
          <button type="button" data-filter="us_plan">美股计划</button>
          <button type="button" data-filter="us_review">美股总结</button>
        </nav>

        <ol id="note-list" class="note-list" aria-label="Daily notes"></ol>
      </aside>

      <main class="journal-view">
        <div class="journal-card">
          <header class="journal-header">
            <div>
              <p id="selected-date" class="eyebrow"></p>
              <h2 id="selected-title">Loading</h2>
            </div>
            <div class="meta-strip">
              <span id="selected-model"></span>
              <span id="selected-scores"></span>
            </div>
          </header>

          <section class="summary-strip" aria-label="Selected note summary">
            <div>
              <span>完成</span>
              <strong id="selected-progress">0/0</strong>
            </div>
            <div>
              <span>导出</span>
              <strong id="selected-updated">-</strong>
            </div>
          </section>

          <div id="section-tabs" class="section-tabs" aria-label="Visible section"></div>
          <article id="journal-content" class="markdown-body"></article>
        </div>
      </main>
      </div>
    </div>

    <script src="./assets/journal-data.js"></script>
    <script src="./assets/app.js"></script>
  </body>
</html>
